<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seattle Drinking Fountains</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="search-bar">
    <form id="search-form">
      <input
        id="search-input"
        type="text"
        placeholder="Search address or landmark"
        autocomplete="off"
        enterkeyhint="search"
      >
      <button type="submit" id="search-btn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </form>
  </div>

  <button id="locate-btn" aria-label="Use my location" title="Use my location">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    </svg>
  </button>

  <div id="layer-control" class="hidden">
    <div id="layer-control-header">Layers</div>
    <button class="layer-toggle active" data-source="city">
      <span class="layer-swatch city"></span> Seattle City GIS
    </button>
    <button class="layer-suboption" data-option="city-unique">
      <span class="checkbox"></span> Show only those not in OSM
    </button>
    <button class="layer-toggle active" data-source="osm">
      <span class="layer-swatch osm"></span> OpenStreetMap
    </button>
  </div>

  <div id="filter-bar">
    <button class="filter-toggle" data-filter="accessible">Accessible</button>
    <button class="filter-toggle" data-filter="bottle">Bottle Filler</button>
    <button class="filter-toggle" data-filter="dog">Dog Bowl</button>
  </div>

  <button id="power-user-btn" aria-label="Toggle power user mode" title="Power user mode">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <div id="fountain-count"></div>

  <div id="legend">
    <div id="legend-header">
      <span id="legend-title">Legend</span>
      <button id="legend-toggle" aria-label="Expand legend">▸</button>
    </div>
    <div id="legend-body" class="collapsed">
      <div class="legend-row">
        <svg width="14" height="18" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.27 21.73 0 14 0z" fill="#2563eb" stroke="#fff" stroke-width="1.5"/><text x="14" y="19" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold" font-family="Arial, sans-serif">?</text></svg>
        No or old rating
      </div>
      <div class="legend-row">
        <svg width="14" height="18" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.27 21.73 0 14 0z" fill="#2563eb" stroke="#fff" stroke-width="1.5"/><circle cx="10" cy="11" r="1.5" fill="#fff" opacity="0.9"/><circle cx="18" cy="11" r="1.5" fill="#fff" opacity="0.9"/><path d="M9 17 Q14 20 19 17" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.9"/></svg>
        Rated
      </div>
      <div class="legend-row">
        <svg width="14" height="18" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.27 21.73 0 14 0z" fill="#c62828" stroke="#fff" stroke-width="1.5"/><line x1="9" y1="10" x2="19" y2="20" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/><line x1="19" y1="10" x2="9" y2="20" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/></svg>
        Shut off
      </div>
      <div class="legend-row">
        <svg width="14" height="18" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.27 21.73 0 14 0z" fill="#e67e22" stroke="#fff" stroke-width="1.5"/><line x1="9" y1="10" x2="19" y2="20" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/><line x1="19" y1="10" x2="9" y2="20" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/></svg>
        Reported off
      </div>
      <div class="legend-row legend-admin-row hidden">
        <svg width="14" height="18" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.27 21.73 0 14 0z" fill="#0891b2" stroke="#fff" stroke-width="1.5"/><text x="14" y="19" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold" font-family="Arial, sans-serif">?</text></svg>
        OpenStreetMap
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
