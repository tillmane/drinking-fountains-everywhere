name: Sync Access Allowlist

on:
  push:
    branches: [main]
    paths: [access-allowlist.txt]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build email list and update CF Access policy
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_HIGHTRUST_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_ID: "11d95cea-0bcb-499d-8339-71687467ca24"
          POLICY_ID: "88b8d37c-3db8-4b9d-bd2d-72b54a999955"
        run: |
          INCLUDE=$(grep -v '^\s*#' access-allowlist.txt | grep -v '^\s*$' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R '{ "email": { "email": . } }' | jq -s .)

          POLICY_JSON=$(jq -n \
            --argjson include "$INCLUDE" \
            '{
              "name": "Allow listed emails",
              "decision": "allow",
              "include": $include
            }')

          echo "Updating policy with $(echo "$INCLUDE" | jq length) email(s)..."

          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/access/apps/${APP_ID}/policies/${POLICY_ID}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$POLICY_JSON" | jq .
